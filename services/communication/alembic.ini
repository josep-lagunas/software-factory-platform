# Alembic configuration for the Communication Service database (sfp_communication).
#
# Scoped per-service (ID-058): migrations here own the Communication database
# schema only. The live database URL is injected at runtime from the
# environment (see alembic/env.py); the sqlalchemy.url below is a local-dev
# placeholder only.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = postgresql+psycopg://communication:communication@localhost:5432/sfp_communication

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
