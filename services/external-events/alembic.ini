# Alembic migration configuration for the External Events service.
#
# Scoped to this service only (ID-058: per-service Alembic). Run from the
# service directory:
#     cd services/external-events
#     alembic upgrade head
#
# The database URL is read from EXTERNAL_EVENTS_DATABASE_URL by env.py and
# must point at the `sfp_external_events` logical database (ID-055).

[alembic]
script_location = src/external_events/infrastructure/persistence/alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =                  # set by env.py from the environment

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
