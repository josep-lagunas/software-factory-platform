# Alembic configuration for the Identity Service database (sfp_identity).
#
# Scoped per-service (ID-058): migrations here own the Identity database
# schema only. The live database URL is injected at runtime from the
# environment (see migrations/env.py); the sqlalchemy.url below is a
# local-dev placeholder only.

[alembic]
script_location = %(here)s/src/identity/infrastructure/persistence/migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = postgresql+psycopg://identity:identity@localhost:5432/sfp_identity

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
